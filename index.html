<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BasedLaunch</title>
    <script>
      // Workaround for libraries (like some Solana dependencies) trying to polyfill fetch
      // in an environment where fetch is a getter-only property.
      const originalFetch = window.fetch;
      Object.defineProperty(window, 'fetch', {
        configurable: true,
        enumerable: true,
        get: () => originalFetch,
        set: () => {
          // Ignore attempts to overwrite fetch
        },
      });
      Object.defineProperty(globalThis, 'fetch', {
        configurable: true,
        enumerable: true,
        get: () => originalFetch,
        set: () => {
          // Ignore attempts to overwrite fetch
        },
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
